services:
  - type: web
    name: adbms-hospital-management-system
    env: node
    plan: free
    buildCommand: npm install && npm run db:init
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hms-adbms-db
          property: connectionString

databases:
  - name: hms-adbms-db
    plan: free
